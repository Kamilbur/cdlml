name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed for creating GitHub Releases on tag builds

jobs:
  lint:
    name: Lint (ruff + pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Ruff (lint)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github ."

      - name: Ruff (format)
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

      - name: pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: "--all-files"

  test:
    name: Tests (pytest) on ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: |
          python -m pytest -q

  build_wheels:
    name: Build wheels (${{ matrix.os }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.0
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build sdist
        run: |
          python -m pip install -U pip
          python -m pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  github_release:
    name: GitHub Release (attach wheels + sdist + wheel index)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist

      - name: Generate pip-friendly wheel index (HTML)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          OUT="dist/cdlml-wheels.html"
          {
            echo "<!doctype html><html><body>"
            echo "<h1>cdlml ${TAG}</h1>"

            # List wheels and sdist as direct download links
            for f in dist/*.whl dist/*.tar.gz; do
              [ -e "$f" ] || continue
              bn="$(basename "$f")"
              url="https://github.com/${REPO}/releases/download/${TAG}/${bn}"
              echo "<a href=\"${url}\">${bn}</a><br/>"
            done

            echo "</body></html>"
          } > "${OUT}"

          echo "Wrote ${OUT}"
          ls -la dist

      - name: Create release + upload assets
        uses: softprops/action-gh-release@v2.3.2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/cdlml-wheels.html

  publish_simple_index:
    name: Publish PEP 503 simple index (GitHub Pages)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist

      - name: Build PEP 503 HTML5 pages
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          PROJECT="cdlml"   # normalized project name for /simple/<project>/

          mkdir -p site/simple/"${PROJECT}"

          # Top-level simple index: lists projects
          cat > site/simple/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Simple index</title>
            </head>
            <body>
          HTML
          echo "      <a href=\"${PROJECT}/\">${PROJECT}</a><br/>" >> site/simple/index.html
          cat >> site/simple/index.html <<'HTML'
            </body>
          </html>
          HTML

          # Project page: lists files
          cat > "site/simple/${PROJECT}/index.html" <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>${PROJECT}</title>
            </head>
            <body>
          HTML

          for f in dist/*.whl dist/*.tar.gz; do
            [ -e "$f" ] || continue
            bn="$(basename "$f")"
            url="https://github.com/${REPO}/releases/download/${TAG}/${bn}"

            # Optional but nice: add sha256 hash fragment
            if command -v sha256sum >/dev/null 2>&1; then
              h="$(sha256sum "$f" | awk '{print $1}')"
              echo "      <a href=\"${url}#sha256=${h}\">${bn}</a><br/>" >> "site/simple/${PROJECT}/index.html"
            else
              echo "      <a href=\"${url}\">${bn}</a><br/>" >> "site/simple/${PROJECT}/index.html"
            fi
          done

          cat >> "site/simple/${PROJECT}/index.html" <<'HTML'
            </body>
          </html>
          HTML

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: true

